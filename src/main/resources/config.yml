machines:
  tea-drying-pan:
    block-id: cgap:tea_drying_pan
    filled-property: filled
    process-ticks: 100
    input-slot: 11
    output-slot: 15
    progress-image-prefix: cgap:tea_progress_
    progress-image-width: 108
    title-update-ticks: 5
    recipes:
      green-tea-clear:
        input:
          id: cgap:tea_leaf
          amount: 1
        conditions:
          weather: clear
        process-ticks: 100
        output:
          id: cgap:green_tea_leaf
          amount: 1
      green-tea-rain:
        input:
          id: cgap:tea_leaf
          amount: 1
        conditions:
          weather: rain
        process-ticks: 120
        output:
          id: cgap:green_tea_leaf
          amount: 1
      green-tea-thunder:
        input:
          id: cgap:tea_leaf
          amount: 1
        conditions:
          weather: thunder
        process-ticks: 140
        output:
          id: cgap:green_tea_leaf
          amount: 1
