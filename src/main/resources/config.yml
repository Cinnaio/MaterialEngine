machines:
  # 炒茶锅：现有原型，保留旧的萎凋/烘制流程。
  tea-drying-pan:
    # 绑定的 CraftEngine 方块 id。
    block-id: cgap:tea_drying_pan
    # 方块状态属性名；filled=true 时切换到装料模型。
    filled-property: filled
    # 默认加工时长，部分配方可覆盖。
    process-ticks: 100
    # 输入槽位。
    input-slot: 12
    # 输出槽位。
    output-slot: 14
    # GUI 标题刷新间隔（tick）。
    title-update-ticks: 5
    # 进度条可显示的最大像素宽度。
    progress-image-width: 108
    # 当前保留的进度图片前缀；代码里暂未直接使用。
    progress-image-prefix: cgap:tea_progress_
    # 配方列表。
    recipes:
      # 晴天：青叶 -> 绿茶叶。
      green-tea-clear:
        input:
          id: cgap:tea_leaf
          amount: 1
        conditions:
          weather: clear
        process-ticks: 100
        output:
          id: cgap:green_tea_leaf
          amount: 1
      # 雨天版本。
      green-tea-rain:
        input:
          id: cgap:tea_leaf
          amount: 1
        conditions:
          weather: rain
        process-ticks: 120
        output:
          id: cgap:green_tea_leaf
          amount: 1
      # 雷雨版本。
      green-tea-thunder:
        input:
          id: cgap:tea_leaf
          amount: 1
        conditions:
          weather: thunder
        process-ticks: 140
        output:
          id: cgap:green_tea_leaf
          amount: 1

  # 茶盘：先作为茶叶处理机器，后续你可以再重新规划职责。
  teapan:
    # 方块 id。
    block-id: cgap:teapan
    # 方块状态属性名。
    state-property: stage
    # 空茶盘状态。
    default-state: 0
    # 有原料时的状态。
    filled-state: 1
    # 运行中状态。
    running-state: 1
    # 默认加工时长。
    process-ticks: 100
    # 输入槽位。
    input-slot: 12
    # 输出槽位。
    output-slot: 14
    # GUI 标题刷新间隔。
    title-update-ticks: 5
    # 进度条像素宽度。
    progress-image-width: 108
    # GUI 图片字体 token。
    gui-image-token: <image:cgap:tea_drying_pan_gui>
    # GUI 图片字符。
    gui-image-char: 섀
    # 茶盘配方。
    recipes:
      # 鲜叶 -> 萎凋叶。
      fresh-to-withered:
        input:
          id: cgap:fresh_tea_leaf
          amount: 1
        process-ticks: 100
        output-state: 3
        output:
          id: cgap:withered_tea_leaf
          amount: 1
      # 萎凋叶 -> 湿茶。
      withered-to-wet:
        input:
          id: cgap:withered_tea_leaf
          amount: 1
        process-ticks: 100
        output-state: 2
        output:
          id: cgap:wet_tea_leaf
          amount: 1
      # 湿茶 -> 黄茶叶。
      wet-to-yellow:
        input:
          id: cgap:wet_tea_leaf
          amount: 1
        process-ticks: 120
        output-state: 4
        output:
          id: cgap:yellow_tea_leaf
          amount: 1
      # 绿茶叶 -> 抹茶叶。
      green-to-matcha:
        input:
          id: cgap:green_tea_leaf
          amount: 1
        process-ticks: 120
        output-state: 5
        output:
          id: cgap:matcha_tea_leaf
          amount: 1

  # 发酵桶：茶叶发酵机器。
  barrel:
    # 方块 id。
    block-id: cgap:barrel
    # 方块状态属性名。
    state-property: stage
    # 空桶状态。
    default-state: 0
    # 有原料时的状态。
    filled-state: 1
    # 运行中状态。
    running-state: 2
    # 默认加工时长。
    process-ticks: 160
    # 输入槽位。
    input-slot: 12
    # 输出槽位。
    output-slot: 14
    # GUI 标题刷新间隔。
    title-update-ticks: 5
    # 进度条像素宽度。
    progress-image-width: 108
    # GUI 图片字体 token。
    gui-image-token: <image:cgap:tea_drying_pan_gui>
    # GUI 图片字符。
    gui-image-char: 섀
    # 发酵桶配方。
    recipes:
      # 碎茶 -> 半发酵茶。
      broken-to-semi:
        input:
          id: cgap:broken_tea_leaf
          amount: 1
        process-ticks: 160
        output-state: 1
        output:
          id: cgap:semi_fermented_tea_leaf
          amount: 1
      # 半发酵茶 -> 全发酵茶。
      semi-to-full:
        input:
          id: cgap:semi_fermented_tea_leaf
          amount: 1
        process-ticks: 180
        output-state: 3
        output:
          id: cgap:fully_fermented_tea_leaf
          amount: 1
      # 全发酵茶 -> 重发酵茶。
      full-to-deep:
        input:
          id: cgap:fully_fermented_tea_leaf
          amount: 1
        process-ticks: 200
        output-state: 4
        output:
          id: cgap:deep_fermented_tea_leaf
          amount: 1

  # 茶炉：慢速烘干茶料。
  tea-stove:
    block-id: cgap:tea_stove
    state-property: lit
    state-type: boolean
    default-state: 0
    filled-state: 0
    running-state: 1
    process-ticks: 200
    input-slot: 12
    output-slot: 14
    title-update-ticks: 5
    progress-image-width: 108
    gui-image-token: <image:cgap:tea_stove_gui>
    gui-image-char: 섁
    recipes:
      broken-to-green:
        input:
          id: cgap:broken_tea_leaf
          amount: 1
        output:
          id: cgap:green_tea_leaf
          amount: 1
      semi-to-oolong:
        input:
          id: cgap:semi_fermented_tea_leaf
          amount: 1
        output:
          id: cgap:oolong_tea_leaf
          amount: 1
      full-to-black:
        input:
          id: cgap:fully_fermented_tea_leaf
          amount: 1
        output:
          id: cgap:black_tea_leaf
          amount: 1
      deep-to-puer:
        input:
          id: cgap:deep_fermented_tea_leaf
          amount: 1
        output:
          id: cgap:puer_tea_leaf
          amount: 1

  # 平底锅：快速烘干茶料。
  cooking-pan:
    block-id: cgap:cooking_pan
    state-property: lit
    state-type: boolean
    default-state: 0
    filled-state: 0
    running-state: 1
    process-ticks: 100
    input-slot: 12
    output-slot: 14
    title-update-ticks: 5
    progress-image-width: 108
    gui-image-token: <image:cgap:tea_drying_pan_gui>
    gui-image-char: 섀
    recipes:
      broken-to-green:
        input:
          id: cgap:broken_tea_leaf
          amount: 1
        output:
          id: cgap:green_tea_leaf
          amount: 1
      semi-to-oolong:
        input:
          id: cgap:semi_fermented_tea_leaf
          amount: 1
        output:
          id: cgap:oolong_tea_leaf
          amount: 1
      full-to-black:
        input:
          id: cgap:fully_fermented_tea_leaf
          amount: 1
        output:
          id: cgap:black_tea_leaf
          amount: 1
      deep-to-puer:
        input:
          id: cgap:deep_fermented_tea_leaf
          amount: 1
        output:
          id: cgap:puer_tea_leaf
          amount: 1
